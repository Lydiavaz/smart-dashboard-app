<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="navbar">
    <h1 id="welcome"></h1>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </header>

  <main class="dashboard">
    <section class="cards">
      <div class="card card-1">
        <div class="card-title">🌤️ Weather</div>
        <div id="card1" class="card-content">Loading...</div>
      </div>
      <div class="card card-2">
        <div class="card-title">💱 Crypto</div>
        <div id="card2" class="card-content">Loading...</div>
      </div>
      <div class="card card-3">
        <div class="card-title">📰 News</div>
        <div id="card3" class="card-content">Loading...</div>
      </div>
    </section>

    <section class="fetched-api-section">
      <h3>Fetched API Data</h3>
      <div id="apiData"></div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
